<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập quản trị</title>
    <link rel="stylesheet" href="css/admin.css?v=integrated-admin-20260530">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>QUẢN TRỊ VIÊN</h1>
                <p>Đăng nhập để tiếp tục</p>
            </div>
            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Nhập email của bạn">
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" required placeholder="Nhập mật khẩu">
                </div>
                <div id="errorMessage" class="error-message"></div>
                <button type="submit" class="btn-login">Đăng nhập</button>
            </form>
            <div class="back-to-home">
                <a href="index.html">← Quay lại trang chủ</a>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PUBLIC_SITE_ORIGIN = 'https://thanhdatshop-api.onrender.com';
        const ADMIN_LOGIN_HOST = window.location.hostname || 'localhost';
        const ADMIN_LOGIN_ORIGIN = window.location.origin;
        const API_URL = (ADMIN_LOGIN_HOST.includes('trycloudflare.com') || (['localhost', '127.0.0.1'].includes(ADMIN_LOGIN_HOST) && window.location.port === '3900'))
            ? `${ADMIN_LOGIN_ORIGIN}/api`
            : `${ADMIN_PUBLIC_SITE_ORIGIN}/api`;

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            
            errorMessage.textContent = '';
            
            try {
                const response = await fetch(`${API_URL}/users/validate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                if (response.ok) {
                    const user = await response.json();
                    
                    if (user.role === 'admin') {
                        localStorage.removeItem('adminUser');
                        sessionStorage.setItem('adminUser', JSON.stringify(user));
                        window.location.href = 'admin.html';
                    } else {
                        errorMessage.textContent = 'Bạn không có quyền truy cập trang quản trị!';
                    }
                } else {
                    const error = await response.json();
                    errorMessage.textContent = error.message || 'Email hoặc mật khẩu không đúng!';
                }
            } catch (error) {
                errorMessage.textContent = 'Có lỗi xảy ra. Vui lòng thử lại!';
                console.error('Login error:', error);
            }
        });

        if (sessionStorage.getItem('adminUser')) {
            const user = JSON.parse(sessionStorage.getItem('adminUser'));
            if (user.role === 'admin') {
                window.location.href = 'admin.html';
            }
        }
    </script>
</body>
</html>
